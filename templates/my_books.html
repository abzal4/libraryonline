<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-lg">
        <div class="container container1">
            <a class="navbar-brand" href="#"><i class="bi bi-book"></i> Library</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#" onclick="navigateTo('/login')">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="navigateTo('/books/google_books')">Books</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="navigateTo('/books')">My books</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <section class="container container2">
        <h3>My books</h3> <br> <br>
        <div id="userBooks" class="book-list">
            
        </div>
        </div>
        <button onclick="logout()">Log out</button>
    </section>
    <div id="bookModal" class="modal">
        <div class="container container-card modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="row justify-content-center align-items-center p-4">
                <div class="col-md-4 text-center">   
                    <img id="modalImage" src="" alt="Book Cover" class="img-fluid rounded">
                </div>
                <div class="col-md-8">
                    <h2 id="modalTitle" class="text-center"></h2>
                    <br>
                    <p><strong>Author:</strong> <span id="modalAuthor"></span></p>
                    <p><strong>Subtitle:</strong> <span id="modalSubtitle"></span></p>
                    <p><strong>Categories:</strong> <span id="modalCategories"></span></p>
                    <p><strong>Rating:</strong> <span id="modalRating"></span></p>
                    <p><strong>language:</strong> <span id="modalLanguage"></span></p>
                    <p><strong>pages:</strong> <span id="modalPages"></span></p>
                    <p><strong>saleability:</strong> <span id="modalSaleability"></span></p>
                    <a id="modalBuyLink" href="#" target="_blank"></a></p>
                </div>
                <div class="col-md-11 mt-3">
                    <br>
                    <p><strong>Description:</strong> <span id="modalDescription"></span></p>
                    <div id="addBookBtn" > </div>
                </div>
                <div class="col-md-8">
                    <div class="rating-card p-4">
                        <div class="star-rating animated-stars">
                            <input type="radio" id="star5" name="rating" value="5">
                            <label for="star5" class="bi bi-star-fill"></label>
                            <input type="radio" id="star4" name="rating" value="4">
                            <label for="star4" class="bi bi-star-fill"></label>
                            <input type="radio" id="star3" name="rating" value="3">
                            <label for="star3" class="bi bi-star-fill"></label>
                            <input type="radio" id="star2" name="rating" value="2">
                            <label for="star2" class="bi bi-star-fill"></label>
                            <input type="radio" id="star1" name="rating" value="1">
                            <label for="star1" class="bi bi-star-fill"></label>
                        </div>
                        <textarea id="review-text" class="form-control mt-3 hidden" placeholder="Write something..."></textarea>
                        <button id="submitReview" class="btn btn-primary mt-2 hidden">Leave a review</button>
                        <button id="showReviewBtn" class="btn btn-primary mt-2 hidden" >Show reviews</button>
                        <div id="modalReviews" style="display: none;"></div>
                        <button onclick="closeReviews()" class="btn btn-primary mt-2 hidden" >Hide reviews</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script defer src="/static/script.js"></script>
</body>
</html>

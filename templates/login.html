<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека книг</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <script defer src="script.js"></script>
    <link rel="stylesheet" href="static/styles.css">
    <style>
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-lg">
        <div class="container container1">
            <a class="navbar-brand" href="#"><i class="bi bi-book"></i> Library</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#" onclick="navigateTo('/login')">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="navigateTo('/books/google_books')">Books</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="navigateTo('/books')">My books</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="loginPage" class="container text-center container1">
        <h2 class="mb-4">Log in</h2>
        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Log in</button>
        </form>
        <p>Don't have an account?</p>
        <button class="btn btn-primary w-100" id="registerButton" onclick="navigateTo('/register')">Register</button>
    </div>
    <script defer src="/static/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

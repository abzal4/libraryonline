<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека</title>
    <link rel="stylesheet" href="static/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        .container1 { 
            max-width: 900px;
            margin-top: 50px;
            background: #8f5d2f;
            color: white; padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1); }
        .hidden { display: none; }
        .card { transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out; border-radius: 10px; border: none; background: white; color: black; }
        .card:hover { transform: scale(1.05); box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2); }
        .navbar { background: #8b5a2b !important; }
        .navbar .navbar-brand, .navbar .nav-link { color: white !important; }
        .btn-primary { background-color: #6b4226; border: none; border-radius: 20px; }
        .btn-primary:hover { background-color: #5a341d; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-lg">
        <div class="container container1">
            <a class="navbar-brand" href="#"><i class="bi bi-book"></i> Библиотека</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#" onclick="showPage('/login')">Вход</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="showPage('booksPage')">Книги</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="showPage('myBooksPage')">Мои книги</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <section class="container container2">
        <h3>My books</h3> <br> <br>
        <div id="userBooks" class="book-list">
            
        </div>
        </div>
        <button onclick="logout()">Log out</button>
    </section>

    <script src="static/script.js"></script>
</body>
</html>
